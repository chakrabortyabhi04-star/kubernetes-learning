apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-deployment
spec:
  replicas: 5  # Number of pod replicas
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: nginx
        image: nginx:1.3
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m" 
            memory: "256Mi"   # Guaranteed memory
          limits:
            cpu: "200m"      
            memory: "512Mi"   # Maximum memory allowed   